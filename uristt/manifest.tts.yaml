id: uristt-tts
version: 1
scheme: tts
description: Text-to-speech pack (mock MVP).
uri_patterns:
  - pattern: tts://local/session/{session}/command/speak
    kind: command
    operation: tts.session.speak
    side_effects: true
    approval: required
handlers:
  python:
    tts.session.speak: python://uristt.handlers:tts_speak
